<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福宝 — 在韩华人AI生活助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --green: #1a9e6e;
    --green-light: #e8f7f1;
    --green-dark: #0d6b4a;
    --bg: #f5f5f0;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e8e8e3;
    --user-bubble: #1a9e6e;
    --bot-bubble: #ffffff;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Header bar */
  .topbar {
    width: 100%;
    max-width: 760px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 0 12px;
  }

  .logo-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .logo-text p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 300;
  }

  .badge {
    margin-left: auto;
    font-size: 11px;
    background: var(--green-light);
    color: var(--green-dark);
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* Chat window */
  .chat-window {
    width: 100%;
    max-width: 760px;
    background: var(--card);
    border-radius: 20px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 560px;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Message bubbles */
  .msg { display: flex; gap: 10px; max-width: 80%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 4px 18px 18px 18px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-color: var(--user-bubble);
    border-radius: 18px 4px 18px 18px;
  }

  .refs {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .ref-tag {
    font-size: 11px;
    background: var(--green-light);
    color: var(--green-dark);
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 400;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #bbb;
    animation: pulse 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Quick chips */
  .chips-row {
    padding: 4px 20px 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
  }

  .chip {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover {
    background: var(--green-light);
    color: var(--green-dark);
    border-color: var(--green);
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--card);
  }

  #user-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 10px 18px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
  }

  #user-input:focus { border-color: var(--green); }
  #user-input::placeholder { color: #bbb; }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  #send-btn:hover { background: var(--green-dark); }
  #send-btn:active { transform: scale(0.94); }

  #send-btn svg { width: 17px; height: 17px; fill: white; }

  /* Config notice */
  .config-bar {
    width: 100%;
    max-width: 760px;
    font-size: 12px;
    color: #9a6800;
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 10px;
    padding: 8px 14px;
    margin-top: 12px;
    line-height: 1.6;
  }

  .config-bar strong { font-weight: 500; }

  /* Error bubble */
  .error-bubble {
    background: #fff1f1;
    border-color: #ffc0c0;
    color: #a00;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-circle">🐼</div>
  <div class="logo-text">
    <h1>福宝</h1>
    <p>在韩华人 AI 生活助手</p>
  </div>
  <div class="badge">知识库驱动</div>
</div>

<div class="chat-window">
  <div id="messages">
    <div class="msg bot">
      <div class="msg-icon">🐼</div>
      <div>
        <div class="bubble">你好！我是福宝 🌿

我是专为在韩华人设计的AI助手，可以帮你解答签证、出入境、生活、创业等各类问题。

我的回答来自整理好的知识库，不会随意猜测——如果我不确定，我会直接告诉你。

请问有什么可以帮你？</div>
      </div>
    </div>
  </div>

  <div class="chips-row">
    <button class="chip" onclick="sendQ('韩国D8投资签证需要什么条件？')">D8投资签证</button>
    <button class="chip" onclick="sendQ('F2签证如何续签？')">F2签证续签</button>
    <button class="chip" onclick="sendQ('D9签证申请需要哪些材料？')">D9签证材料</button>
    <button class="chip" onclick="sendQ('如何申请韩国永久居留（F5）？')">F5永居申请</button>
  </div>

  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="向福宝提问…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<div class="config-bar">
  ⚙️ <strong>开发者提示：</strong>将下方代码中的 <code>YOUR_API_KEY</code>、<code>YOUR_ACCOUNT_ID</code>、<code>YOUR_SERVICE_ID</code> 替换为你的火山方舟真实参数，即可连接知识库。当前为演示模式。
</div>

<script>
const CONFIG = {
  apiEndpoint: '/api/chat'
};

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function sendQ(text) {
  inputEl.value = text;
  handleSend();
}

function appendMsg(role, text, refs, isError) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  if (role === 'bot') {
    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.textContent = '🐼';
    wrap.appendChild(icon);
  }

  const inner = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isError ? ' error-bubble' : '');
  bubble.textContent = text;
  inner.appendChild(bubble);

  if (refs && refs.length > 0) {
    const refsDiv = document.createElement('div');
    refsDiv.className = 'refs';
    refs.forEach(r => {
      const tag = document.createElement('span');
      tag.className = 'ref-tag';
      tag.textContent = r;
      refsDiv.appendChild(tag);
    });
    inner.appendChild(refsDiv);
  }

  wrap.appendChild(inner);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = '<div class="msg-icon">🐼</div><div><div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function callFubaoAPI(question) {
  try {
    const res = await fetch(CONFIG.apiEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: question })
    });
    if (!res.ok) throw new Error('请求失败：' + res.status);
    const data = await res.json();
    const answer = data?.answer || data?.result || data?.choices?.[0]?.message?.content || '暂时无法获取回答，请稍后重试。';
    const refs = (data?.references || []).map(r => r.doc_name || r.title || '').filter(Boolean);
    return { text: answer, refs };
  } catch (err) {
    return { text: '连接失败：' + err.message, refs: [], isError: true };
  }
}

async function handleSend() {
  const q = inputEl.value.trim();
  if (!q) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  appendMsg('user', q);
  showTyping();

  const result = await callFubaoAPI(q);
  removeTyping();
  appendMsg('bot', result.text, result.refs, result.isError);
}
</script>
</body>
</html>
